<div class="container">
  <mat-card class="translate-card">
    <mat-card-header>
      <mat-card-title>Traducción en vivo</mat-card-title>
      <mat-card-subtitle>Pulsa “Traducir” para iniciar desde el guante</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <!-- Acción: sólo disparamos la traducción -->
      <div class="actions">
        <button
          mat-flat-button
          color="accent"
          (click)="onTranslate()"
          [disabled]="loading">Traducir
        </button>
        <mat-progress-spinner
          *ngIf="loading"
          mode="indeterminate"
          diameter="24">
        </mat-progress-spinner>
      </div>

      <!-- Resultado: se rellena automáticamente -->
      <div class="result">
        <mat-form-field appearance="fill" class="full-width">
          <mat-label>Traducción</mat-label>
          <textarea
            matInput
            rows="5"
            [value]="resultText || ''"
            readonly
            placeholder="Aquí aparecerá la traducción…">
          </textarea>
        </mat-form-field>
      </div>
    </mat-card-content>
  </mat-card>
</div>
